<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lumo</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  padding:40px;
}
.container{
  width:600px;
}
textarea,select,input,button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}
button{
  background:#38bdf8;
  font-weight:bold;
  cursor:pointer;
}
#outputBox{
  background:#020617;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  max-height:260px;
  overflow:auto;
  white-space:pre-wrap;
}
.copyBtn{
  margin-top:6px;
  background:#22c55e;
}
.pro{
  display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>💡 Lumo</h2>

<textarea id="idea" placeholder="Enter idea"></textarea>

<select id="mode" onchange="toggleMode()">
  <option value="beginner">Beginner</option>
  <option value="pro">Pro</option>
</select>

<div id="proFields" class="pro">
  <input id="angle" placeholder="Angle (optional)">
  <input id="lighting" placeholder="Lighting (optional)">
  <input id="lens" placeholder="Lens (optional)">
  <input id="style" placeholder="Style (optional)">
  <input id="composition" placeholder="Composition (optional)">

  <select id="format">
    <option value="text">Text Prompt</option>
    <option value="json">JSON Prompt</option>
  </select>
</div>

<button onclick="generate()">Generate</button>

<div id="outputBox"></div>
<button class="copyBtn" onclick="copyOutput()">Copy</button>

</div>

<script>
function toggleMode(){
  const m=document.getElementById("mode").value;
  document.getElementById("proFields").style.display=
    m==="pro"?"block":"none";
}

async function generate(){

  const idea=document.getElementById("idea").value;
  const mode=document.getElementById("mode").value;
  const format=document.getElementById("format")?.value || "text";

  const payload={
    prompt:idea,
    mode:mode,
    format:format
  };

  if(mode==="pro"){
    payload.angle=document.getElementById("angle").value||"auto";
    payload.lighting=document.getElementById("lighting").value||"auto";
    payload.lens=document.getElementById("lens").value||"auto";
    payload.style=document.getElementById("style").value||"auto";
    payload.composition=document.getElementById("composition").value||"auto";
  }

  const res=await fetch("https://lumo-ai-orhd.onrender.com/generate",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(payload)
  });

  const data=await res.json();

  document.getElementById("outputBox").textContent=data.output;
}

function copyOutput(){
  const text=document.getElementById("outputBox").textContent;
  navigator.clipboard.writeText(text);
}
</script>

</body>

</html>
